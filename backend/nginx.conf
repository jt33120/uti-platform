# Nginx reverse proxy for the UTI Platform backend.
# Install on the VPS:
#   sudo cp /home/julian.talou/app/backend/nginx.conf /etc/nginx/sites-available/plateforme
#   sudo ln -sf /etc/nginx/sites-available/plateforme /etc/nginx/sites-enabled/plateforme
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then enable HTTPS (certbot rewrites this file to add the 443 block + redirect):
#   sudo certbot --nginx -d vps-cc93f2a8.vps.ovh.net
server {
    listen 80;
    server_name vps-cc93f2a8.vps.ovh.net;

    # CV PDFs / avatars are uploaded through the API — raise the default 1 MB limit.
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI matching can take a while — give upstream generous timeouts.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
